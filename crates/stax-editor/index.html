<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stax</title>
  <!-- suppress automatic favicon 404 -->
  <link rel="icon" href="data:,">
  <!-- trunk directive: compile the Rust binary to WASM and inject the loader -->
  <link data-trunk rel="rust" data-integrity="false" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f4f1ea;
      font-family: "JetBrains Mono", monospace;
    }

    #stax_canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Loading overlay — hidden once the app takes over */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f1ea;
      z-index: 10;
    }
    #loading p {
      font-size: 13px;
      color: #6b6558;
      letter-spacing: 0.12em;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading"><p>loading stax…</p></div>
  <canvas id="stax_canvas"></canvas>
</body>
</html>
